<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Traffic Chalan | Smart Logger</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --red: #dc3545; }

        body {
            background-color: #121212;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: #1a2533 !important;
        }

        /* Card */
        .card {
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 20px rgba(220,53,69,0.3);
        }

        /* Status */
        .status-paid {
            background: #28a745;
            color: white;
        }

        .status-unpaid {
            background: #ffc107;
            color: #000;
        }

        /* Light Mode */
        .light-mode {
            background-color: #f8f9fa !important;
            color: #212529 !important;
        }

        .light-mode .card,
        .light-mode .table-dark,
        .light-mode .bg-dark {
            background-color: #ffffff !important;
            color: #212529 !important;
        }

        .light-mode .navbar {
            background: #0d6efd !important;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🚦 Smart Traffic Logger
        </a>

        <div>
            <a href="{{ url_for('main.add_violation') }}" class="btn btn-danger me-2">
                + Log Violation
            </a>

            <a href="{{ url_for('main.history') }}" class="btn btn-outline-light me-2">
                History
            </a>

            <a href="{{ url_for('main.logout') }}" class="btn btn-warning">
                Logout
            </a>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category=='success' else 'danger' }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

<!-- THEME BUTTON -->
<button onclick="toggleTheme()" 
        class="btn btn-outline-light position-fixed bottom-0 end-0 m-4">
    <i class="fas fa-moon" id="theme-icon"></i>
</button>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function toggleTheme() {
    document.body.classList.toggle('light-mode');

    const icon = document.getElementById('theme-icon');

    if (document.body.classList.contains('light-mode')) {
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('theme', 'light');
    } else {
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('theme', 'dark');
    }
}

// load saved theme
window.onload = () => {
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
    }
}
</script>

</body>
</html>
