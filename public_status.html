{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="card shadow p-4">

        <h3 class="text-center text-danger mb-4">
            🚦 Violation Details
        </h3>

        <p><strong>Vehicle:</strong> {{ violation.vehicle_number }}</p>
        <p><strong>Violation:</strong> {{ violation.violation_type }}</p>
        <p><strong>Location:</strong> {{ violation.location }}</p>
        <p><strong>Fine:</strong> ₹{{ "%.2f"|format(violation.fine_amount) }}</p>

        <p>
            <strong>Status:</strong> 
            <span class="badge {% if violation.status=='Paid' %}bg-success{% else %}bg-warning text-dark{% endif %}">
                {{ violation.status }}
            </span>
        </p>

    </div>
</div>

{% endblock %}
